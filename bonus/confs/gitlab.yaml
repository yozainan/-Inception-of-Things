# ═══════════════════════════════════════════════════════════════════════
#  GitLab CE Deployment (Local Git Repository)
# ═══════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: gitlab
  labels:
    app: gitlab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      containers:
      - name: gitlab
        # Latest version of Gitlab CE
        image: gitlab/gitlab-ce:latest
        ports:
        - containerPort: 80
          name: http
        - containerPort: 22
          name: ssh
        env:
        - name: GITLAB_OMNIBUS_CONFIG
          value: |
            external_url 'http://gitlab-svc.gitlab.svc.cluster.local'
            gitlab_rails['initial_root_password'] = 'rootuserpassword123'
            prometheus_monitoring['enable'] = false
            grafana['enable'] = false
            alertmanager['enable'] = false
            nginx['listen_port'] = 80
            nginx['listen_https'] = false
        # Important: Gitlab takes a long time to start up. High timeout thresholds.
        readinessProbe:
          httpGet:
            path: /help
            port: 80
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 20
        resources:
          requests:
            memory: "3Gi"
            cpu: "1000m"
          limits:
            memory: "6Gi"
            cpu: "3000m"
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab-svc
  namespace: gitlab
spec:
  selector:
    app: gitlab
  ports:
  - port: 80
    targetPort: 80
    name: http
    nodePort: 30080
  - port: 22
    targetPort: 22
    name: ssh
    nodePort: 30022
  type: NodePort
